<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onvault</title>
<style>
:root {
    color-scheme: dark;
    --bg: #0d0d0d;
    --panel: rgba(18, 18, 18, 0.98);
    --card: rgba(26, 26, 26, 0.96);
    --card-hover: rgba(34, 34, 34, 0.98);
    --border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --text-soft: rgba(255, 255, 255, 0.72);
    --text-muted: rgba(255, 255, 255, 0.42);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.15);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.15);
    --orange: #f59e0b;
    --orange-dim: rgba(245, 158, 11, 0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59, 130, 246, 0.12);
    --radius: 10px;
    --radius-sm: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 300px;
    min-height: 200px;
    font-size: 12px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* Header */
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
}
.header .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px;
}
.header .logo svg { width: 18px; height: 18px; }
.status-badge {
    font-size: 10px; padding: 3px 8px; border-radius: 20px;
    font-weight: 500;
}
.status-badge.locked { background: var(--red-dim); color: var(--red); }
.status-badge.unlocked { background: var(--green-dim); color: var(--green); }

/* Section */
.section { padding: 8px 12px; }
.section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); padding: 4px 4px 6px;
}

/* Vault cards */
.vault-card {
    background: var(--card); border-radius: var(--radius);
    padding: 10px 12px; margin-bottom: 6px;
    border: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
}
.vault-card:hover { background: var(--card-hover); }
.vault-card .vault-row {
    display: flex; align-items: center; justify-content: space-between;
}
.vault-card .vault-name {
    font-weight: 600; font-size: 12px;
    display: flex; align-items: center; gap: 6px;
}
.vault-card .vault-name .icon { font-size: 14px; }
.vault-card .vault-source {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    font-family: 'SF Mono', Menlo, monospace;
}
.vault-card .vault-status {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500;
}
.vault-card .vault-status.mounted { background: var(--green-dim); color: var(--green); }
.vault-card .vault-status.locked { background: var(--red-dim); color: var(--red); }

/* Vault detail panel (hidden by default) */
.vault-detail {
    display: none; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
}
.vault-card.expanded .vault-detail { display: block; }
.vault-actions {
    display: flex; gap: 4px; flex-wrap: wrap;
}
.vault-actions button {
    font-size: 10px; padding: 4px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    color: var(--text-soft); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
}
.vault-actions button:hover {
    background: var(--blue-dim); color: var(--blue); border-color: rgba(59, 130, 246, 0.3);
}
.vault-actions button.danger:hover {
    background: var(--red-dim); color: var(--red); border-color: rgba(239, 68, 68, 0.3);
}

/* Denial cards */
.denial-card {
    background: var(--card); border-radius: var(--radius-sm);
    padding: 8px 10px; margin-bottom: 4px;
    border: 1px solid var(--border); font-size: 11px;
    display: flex; align-items: center; justify-content: space-between;
}
.denial-info { flex: 1; }
.denial-proc { font-weight: 600; color: var(--orange); }
.denial-file { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', Menlo, monospace; }
.denial-time { font-size: 9px; color: var(--text-muted); white-space: nowrap; margin-left: 8px; }
.denial-allow {
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    border: 1px solid rgba(34, 197, 94, 0.3); background: var(--green-dim);
    color: var(--green); cursor: pointer; margin-left: 6px; font-family: inherit;
}

/* Empty state */
.empty {
    text-align: center; padding: 16px; color: var(--text-muted); font-size: 11px;
}

/* Action buttons */
.action-bar {
    display: flex; gap: 6px; padding: 8px 12px;
    border-top: 1px solid var(--border);
}
.action-bar button {
    flex: 1; padding: 8px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-soft); cursor: pointer; font-size: 11px;
    font-weight: 500; transition: all 0.15s; font-family: inherit;
}
.action-bar button:hover {
    background: var(--card-hover); color: var(--text);
}
.action-bar button.primary {
    background: var(--blue-dim); color: var(--blue);
    border-color: rgba(59, 130, 246, 0.25);
}
.action-bar button.primary:hover {
    background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4);
}

/* Footer */
.footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
}
.footer a { color: var(--text-muted); text-decoration: none; }
.footer a:hover { color: var(--text-soft); }

/* Refresh spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 1s linear infinite; display: inline-block; }

/* No vaults state */
.add-vault-prompt {
    text-align: center; padding: 20px 16px;
}
.add-vault-prompt .icon { font-size: 28px; margin-bottom: 8px; }
.add-vault-prompt p { color: var(--text-muted); margin-bottom: 12px; font-size: 11px; }
.add-vault-prompt button {
    padding: 8px 20px; border-radius: var(--radius-sm);
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.3);
    cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        onvault
    </div>
    <span class="status-badge locked" id="statusBadge">Locked</span>
</div>

<div id="vaultSection" class="section">
    <div class="section-title">Vaults</div>
    <div id="vaultList"></div>
</div>

<div id="denialSection" class="section" style="display:none">
    <div class="section-title">Recent Denials</div>
    <div id="denialList"></div>
</div>

<div class="action-bar">
    <button class="primary" onclick="addVault()">+ Add Vault</button>
    <button onclick="viewPolicies()">Policies</button>
    <button onclick="refresh()" id="refreshBtn">Refresh</button>
</div>

<div class="footer">
    <span>onvault 0.1.0</span>
    <span id="lastUpdate">—</span>
</div>

<script>
const API = window.location.origin;
let data = { locked: true, vault_count: 0, vaults: [] };
let denials = [];

async function fetchData() {
    try {
        const [statusRes, denialsRes] = await Promise.all([
            fetch(API + '/api/status'),
            fetch(API + '/api/denials')
        ]);
        data = await statusRes.json();
        denials = await denialsRes.json();
    } catch (e) {
        data = { locked: true, vault_count: 0, vaults: [] };
        denials = [];
    }
    render();
}

function timeAgo(ts) {
    const secs = Math.floor(Date.now() / 1000) - ts;
    if (secs < 60) return secs + 's ago';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
    return Math.floor(secs / 3600) + 'h ago';
}

function render() {
    // Status badge
    const badge = document.getElementById('statusBadge');
    if (data.locked) {
        badge.className = 'status-badge locked';
        badge.textContent = 'Locked';
    } else {
        badge.className = 'status-badge unlocked';
        badge.textContent = data.vault_count + ' vault(s)';
    }

    // Vaults
    const vaultList = document.getElementById('vaultList');
    if (data.vaults.length === 0) {
        vaultList.innerHTML = '<div class="add-vault-prompt">' +
            '<div class="icon">🔒</div>' +
            '<p>No vaults configured yet.<br>Protect your first directory.</p>' +
            '</div>';
    } else {
        vaultList.innerHTML = data.vaults.map(v =>
            '<div class="vault-card" onclick="toggleVault(this)">' +
                '<div class="vault-row">' +
                    '<div class="vault-name">' +
                        '<span class="icon">' + (v.mounted ? '🔓' : '🔒') + '</span>' +
                        v.id +
                    '</div>' +
                    '<span class="vault-status ' + (v.mounted ? 'mounted' : 'locked') + '">' +
                        (v.mounted ? 'Active' : 'Locked') +
                    '</span>' +
                '</div>' +
                '<div class="vault-source">' + v.source + '</div>' +
                '<div class="vault-detail">' +
                    '<div class="vault-actions">' +
                        '<button onclick="event.stopPropagation();viewRules(\'' + v.id + '\')">View Rules</button>' +
                        '<button onclick="event.stopPropagation();allowProcess(\'' + v.id + '\')">Allow Process</button>' +
                        '<button onclick="event.stopPropagation();denyProcess(\'' + v.id + '\')">Deny Process</button>' +
                        '<button class="danger" onclick="event.stopPropagation();removeVault(\'' + v.id + '\')">Remove</button>' +
                    '</div>' +
                '</div>' +
            '</div>'
        ).join('');
    }

    // Denials
    const denialSection = document.getElementById('denialSection');
    const denialList = document.getElementById('denialList');
    if (denials.length > 0) {
        denialSection.style.display = 'block';
        denialList.innerHTML = denials.slice(-5).reverse().map(d =>
            '<div class="denial-card">' +
                '<div class="denial-info">' +
                    '<span class="denial-proc">' + d.process + '</span>' +
                    ' → ' + d.vault +
                    '<div class="denial-file">' + d.file + '</div>' +
                '</div>' +
                '<span class="denial-time">' + timeAgo(d.time) + '</span>' +
                '<button class="denial-allow" onclick="allowDenied(\'' + d.path + '\',\'' + d.vault + '\')">Allow</button>' +
            '</div>'
        ).join('');
    } else {
        denialSection.style.display = 'none';
    }

    document.getElementById('lastUpdate').textContent =
        new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

function toggleVault(el) { el.classList.toggle('expanded'); }

async function refresh() {
    const btn = document.getElementById('refreshBtn');
    btn.innerHTML = '<span class="spinning">↻</span>';
    await fetchData();
    btn.textContent = 'Refresh';
}

function addVault() { alert('Use CLI: onvault vault add <path> --smart'); }
function viewPolicies() { window.open(API + '/api/policies', '_blank'); }
function viewRules(id) { alert('Use CLI: onvault rules ' + id); }
function allowProcess(id) { alert('Use CLI: onvault allow <process_path> ' + id); }
function denyProcess(id) { alert('Use CLI: onvault deny <process_path> ' + id); }
function removeVault(id) { alert('Use CLI: onvault vault remove ' + id); }
function allowDenied(path, vault) { alert('Use CLI: onvault allow ' + path + ' ' + vault); }

// Auto-refresh
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
