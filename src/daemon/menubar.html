<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>onvault</title>
<style>
:root {
    color-scheme: dark;
    --bg: #0d0d0d;
    --card: rgba(26, 26, 26, 0.96);
    --card-hover: rgba(34, 34, 34, 0.98);
    --border: rgba(255, 255, 255, 0.08);
    --text: #ffffff;
    --text-soft: rgba(255, 255, 255, 0.72);
    --text-muted: rgba(255, 255, 255, 0.42);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.15);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.15);
    --orange: #f59e0b;
    --orange-dim: rgba(245, 158, 11, 0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59, 130, 246, 0.12);
    --radius: 10px;
    --radius-sm: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    width: 300px; font-size: 12px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
}
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
}
.header .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; }
.header .logo svg { width: 18px; height: 18px; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.badge.locked { background: var(--red-dim); color: var(--red); }
.badge.unlocked { background: var(--green-dim); color: var(--green); }
.section { padding: 8px 12px 4px; }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 4px 4px 6px; }
.vault-card { background: var(--card); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.vault-card:hover { background: var(--card-hover); }
.vault-row { display: flex; align-items: center; justify-content: space-between; }
.vault-name { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.vault-name .icon { font-size: 14px; }
.vault-source { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-family: 'SF Mono', Menlo, monospace; }
.vault-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.vault-status.mounted { background: var(--green-dim); color: var(--green); }
.vault-status.locked { background: var(--red-dim); color: var(--red); }
.vault-detail { display: none; }
.vault-card.expanded .vault-detail { display: block; padding-top: 8px; margin-top: 8px; border-top: 1px solid var(--border); }
.vault-actions { display: flex; gap: 4px; flex-wrap: wrap; }
.vault-actions button { font-size: 10px; padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-soft); cursor: pointer; transition: all 0.15s; font-family: inherit; }
.vault-actions button:hover { background: var(--blue-dim); color: var(--blue); border-color: rgba(59, 130, 246, 0.3); }
.vault-actions button.danger:hover { background: var(--red-dim); color: var(--red); border-color: rgba(239, 68, 68, 0.3); }
.denial-card { background: var(--card); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 4px; border: 1px solid var(--border); font-size: 11px; display: flex; align-items: center; justify-content: space-between; }
.denial-info { flex: 1; }
.denial-proc { font-weight: 600; color: var(--orange); }
.denial-file { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', Menlo, monospace; }
.denial-time { font-size: 9px; color: var(--text-muted); white-space: nowrap; margin-left: 8px; }
.denial-allow { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(34, 197, 94, 0.3); background: var(--green-dim); color: var(--green); cursor: pointer; margin-left: 6px; font-family: inherit; }
.action-bar { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
.action-bar button { flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--text-soft); cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.15s; font-family: inherit; }
.action-bar button:hover { background: var(--card-hover); color: var(--text); }
.action-bar button.primary { background: var(--blue-dim); color: var(--blue); border-color: rgba(59, 130, 246, 0.25); }
.action-bar button.primary:hover { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); }
.footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 1s linear infinite; display: inline-block; }
.empty-state { text-align: center; padding: 20px 16px; }
.empty-state .icon { font-size: 28px; margin-bottom: 8px; }
.empty-state p { color: var(--text-muted); margin-bottom: 4px; font-size: 11px; }
/* Toast notification (replaces browser alerts) */
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.error { color: var(--red); }
/* Input row for inline allow/deny */
.input-row { display: flex; gap: 4px; margin-top: 6px; }
.input-row input { flex: 1; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: var(--text); font-size: 10px; font-family: 'SF Mono', Menlo, monospace; outline: none; }
.input-row input:focus { border-color: rgba(59, 130, 246, 0.5); }
.input-row button { padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--green-dim); color: var(--green); font-size: 10px; cursor: pointer; font-family: inherit; }
/* Overlay panel */
.panel-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; }
.panel-overlay.show { display: flex; align-items: center; justify-content: center; }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); width: 280px; max-height: 350px; overflow: hidden; }
.panel-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px; }
.panel-body { padding: 10px 12px; font-size: 10px; color: var(--text-soft); white-space: pre-wrap; font-family: 'SF Mono', Menlo, monospace; overflow-y: auto; max-height: 280px; margin: 0; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        onvault
    </div>
    <span class="badge locked" id="statusBadge">Locked</span>
</div>

<div id="vaultSection" class="section">
    <div class="section-title">Vaults</div>
    <div id="vaultList"></div>
</div>

<div id="denialSection" class="section" style="display:none">
    <div class="section-title">Recent Denials</div>
    <div id="denialList"></div>
</div>

<div id="addVaultPanel" style="display:none; padding: 8px 12px;">
    <div class="section-title">Add Vault</div>
    <div class="input-row">
        <input placeholder="~/.ssh or /path/to/dir" id="addVaultInput">
        <button onclick="doAddVault()">Protect</button>
    </div>
</div>

<div class="action-bar">
    <button class="primary" onclick="promptAddVault()">+ Add Vault</button>
    <button onclick="viewPolicies()">Policies</button>
    <button id="lockBtn" onclick="doLockUnlock()">Lock</button>
    <button onclick="refresh()" id="refreshBtn">Refresh</button>
</div>

<div class="footer">
    <span>onvault 0.1.0</span>
    <span id="lastUpdate"></span>
</div>

<div class="toast" id="toast"></div>

<div class="panel-overlay" id="panelOverlay" onclick="hidePanel()">
    <div class="panel" onclick="event.stopPropagation()">
        <div class="panel-header">
            <span id="panelTitle"></span>
            <button onclick="hidePanel()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px">✕</button>
        </div>
        <pre class="panel-body" id="panelBody"></pre>
        <div id="panelAuth" style="display:none;padding:10px 12px;border-top:1px solid var(--border)">
            <div class="input-row">
                <input type="password" placeholder="Passphrase" id="panelPassInput">
                <button id="panelAuthBtn" onclick="panelAuthSubmit()">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script>
var API = window.location.origin;
var data = { locked: true, vault_count: 0, vaults: [] };
var denials = [];
var expandedVaults = {};
var pendingAuthAction = null;

function toast(msg, isError) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(function() { t.className = 'toast'; }, 2500);
}

function postAPI(path, body) {
    return fetch(API + path, { method: 'POST', body: body }).then(function(r) { return r.json(); });
}

function fetchData() {
    return Promise.all([
        fetch(API + '/api/status').then(function(r) { return r.json(); }),
        fetch(API + '/api/denials').then(function(r) { return r.json(); })
    ]).then(function(results) {
        data = results[0];
        denials = results[1];
        render();
    }).catch(function() {
        data = { locked: true, vault_count: 0, vaults: [] };
        denials = [];
        render();
    });
}

function timeAgo(ts) {
    var s = Math.floor(Date.now() / 1000) - ts;
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    return Math.floor(s / 3600) + 'h';
}

function render() {
    var badge = document.getElementById('statusBadge');
    badge.className = 'badge ' + (data.locked ? 'locked' : 'unlocked');
    badge.textContent = data.locked ? 'Locked' : data.vault_count + ' vault(s)';

    var vl = document.getElementById('vaultList');
    if (data.vaults.length === 0) {
        vl.innerHTML = '<div class="empty-state"><div class="icon">' + (data.locked ? '🔒' : '🛡️') + '</div>' +
            '<p>' + (data.locked ? 'Locked — click Unlock below.' : 'No vaults yet. Click + Add Vault.') + '</p></div>';
    } else {
        vl.innerHTML = data.vaults.map(function(v) {
            var exp = expandedVaults[v.id] ? ' expanded' : '';
            return '<div class="vault-card' + exp + '" onclick="toggle(\'' + v.id + '\')">' +
                '<div class="vault-row"><div class="vault-name"><span class="icon">' +
                (v.mounted ? '🔓' : '🔒') + '</span>' + v.id + '</div>' +
                '<span class="vault-status ' + (v.mounted ? 'mounted' : 'locked') + '">' +
                (v.mounted ? 'Active' : 'Locked') + '</span></div>' +
                '<div class="vault-source">' + v.source + '</div>' +
                '<div class="vault-detail">' +
                '<div class="vault-actions">' +
                '<button onclick="event.stopPropagation();viewRules(\'' + v.id + '\')">Rules</button>' +
                '<button onclick="event.stopPropagation();showInput(\'allow\',\'' + v.id + '\')">Allow</button>' +
                '<button onclick="event.stopPropagation();showInput(\'deny\',\'' + v.id + '\')">Deny</button>' +
                '<button class="danger" onclick="event.stopPropagation();toast(\'Use CLI: onvault vault remove ' + v.id + '\')">Remove</button>' +
                '</div>' +
                '<div class="input-row" id="allow-' + v.id + '" style="display:none">' +
                '<input placeholder="/usr/bin/process" id="allow-input-' + v.id + '">' +
                '<button onclick="event.stopPropagation();doRule(\'allow\',\'' + v.id + '\')">Allow</button>' +
                '</div>' +
                '<div class="input-row" id="deny-' + v.id + '" style="display:none">' +
                '<input placeholder="/usr/bin/process" id="deny-input-' + v.id + '">' +
                '<button onclick="event.stopPropagation();doRule(\'deny\',\'' + v.id + '\')">Deny</button>' +
                '</div></div>';
        }).join('');
    }

    var ds = document.getElementById('denialSection');
    var dl = document.getElementById('denialList');
    if (denials.length > 0) {
        ds.style.display = 'block';
        dl.innerHTML = denials.slice(-5).reverse().map(function(d) {
            return '<div class="denial-card"><div class="denial-info">' +
                '<span class="denial-proc">' + d.process + '</span> \u2192 ' + d.vault +
                '<div class="denial-file">' + d.file + '</div></div>' +
                '<span class="denial-time">' + timeAgo(d.time) + '</span>' +
                '<button class="denial-allow" onclick="quickAllow(\'' + d.path + '\',\'' + d.vault + '\')">Allow</button></div>';
        }).join('');
    } else { ds.style.display = 'none'; }

    var lockBtn = document.getElementById('lockBtn');
    if (lockBtn) lockBtn.textContent = data.locked ? 'Unlock' : 'Lock';

    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    notifyResize();
}

function toggle(id) {
    expandedVaults[id] = !expandedVaults[id];
    render();
}

function showInput(type, id) {
    var el = document.getElementById(type + '-' + id);
    var other = type === 'allow' ? 'deny' : 'allow';
    el.style.display = el.style.display === 'none' ? 'flex' : 'none';
    document.getElementById(other + '-' + id).style.display = 'none';
}

function doRule(type, id) {
    var input = document.getElementById(type + '-input-' + id);
    var proc = input.value.trim();
    if (!proc) return;
    input.value = '';
    document.getElementById(type + '-' + id).style.display = 'none';
    postAPI('/api/' + type, proc + '\n' + id).then(function(j) {
        toast(j.msg, !j.ok);
        fetchData();
    }).catch(function() { toast('Failed', true); });
}

function promptAddVault() {
    var panel = document.getElementById('addVaultPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') document.getElementById('addVaultInput').focus();
    notifyResize();
}

function doAddVault() {
    var input = document.getElementById('addVaultInput');
    var path = input.value.trim();
    if (!path) return;
    input.value = '';
    document.getElementById('addVaultPanel').style.display = 'none';
    postAPI('/api/vault/add', path).then(function(j) {
        toast(j.msg, !j.ok);
        fetchData();
    }).catch(function() { toast('Failed to add vault', true); });
}

function viewRules(id) {
    fetch(API + '/api/rules?vault=' + id).then(function(r) { return r.text(); }).then(function(text) {
        showPanel('Rules: ' + id, text);
    }).catch(function() { toast('Failed to load rules', true); });
}

function quickAllow(proc, vault) {
    postAPI('/api/allow', proc + '\n' + vault).then(function(j) {
        toast(j.msg, !j.ok);
        fetchData();
    }).catch(function() { toast('Failed', true); });
}

function refresh() {
    var btn = document.getElementById('refreshBtn');
    btn.innerHTML = '<span class="spinning">\u21bb</span>';
    fetchData().then(function() { btn.textContent = 'Refresh'; });
}

function doLockUnlock() {
    if (data.locked) {
        showPanel('Unlock', 'Enter your passphrase to unlock all vaults.');
        pendingAuthAction = 'unlock';
    } else {
        showPanel('Lock All Vaults', 'Enter your passphrase to lock and unmount all vaults.');
        pendingAuthAction = 'lock';
    }
    document.getElementById('panelAuth').style.display = 'block';
    document.getElementById('panelPassInput').value = '';
    setTimeout(function() { document.getElementById('panelPassInput').focus(); }, 100);
}

function panelAuthSubmit() {
    var pass = document.getElementById('panelPassInput').value;
    if (!pass) return;
    document.getElementById('panelPassInput').value = '';
    var action = pendingAuthAction;
    pendingAuthAction = null;

    /* Show loading state */
    document.getElementById('panelBody').textContent = 'Authenticating...';
    document.getElementById('panelAuth').style.display = 'none';

    postAPI('/api/' + action, pass).then(function(j) {
        toast(j.msg, !j.ok);
        hidePanel();
        fetchData();
    }).catch(function() {
        toast('Failed — try again', true);
        hidePanel();
    });
}

function viewPolicies() {
    fetch(API + '/api/policies').then(function(r) { return r.text(); }).then(function(text) {
        showPanel('All Policies', text);
    }).catch(function() { toast('Failed to load policies', true); });
}

function showPanel(title, body) {
    document.getElementById('panelTitle').textContent = title;
    document.getElementById('panelBody').textContent = body || '';
    document.getElementById('panelAuth').style.display = 'none';
    document.getElementById('panelOverlay').className = 'panel-overlay show';
}

function hidePanel() {
    document.getElementById('panelOverlay').className = 'panel-overlay';
}

function notifyResize() {
    try { window.webkit.messageHandlers.resize.postMessage(document.body.scrollHeight); } catch(e) {}
}

fetchData();
window._refreshInterval = setInterval(fetchData, 5000);
</script>
</body>
</html>
